[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mongoose"]
  timeout = 10

[[redirects]]
  from = "/api/v1/auth/*"
  to = "/.netlify/functions/auth/:splat"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables for local development
[dev]
  framework = "vite"
  publish = "dist"
  functions = "netlify/functions"