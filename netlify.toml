[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mongoose"]
  [functions.timeout]
    max = 10  # Maximum execution time in seconds

# Environment variables for Netlify Functions
[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--prefix=netlify/functions"
  
# Required environment variables for production
[context.production.environment]
  NODE_ENV = "production"
  MONGODB_URI = "mongodb+srv://tonnyjosiah0:RoPir9xUMojez9xU@clustercrops.o4jur50.mongodb.net/"
  JWT_SECRET = "your-jwt-secret-key"  # Make sure to change this in production
  FRONTEND_URL = "https://ai-advisory-agri.netlify.app"
  
# Environment variables for development
[dev]
  framework = "vite"
  publish = "dist"
  targetPort = 5000
  port = 5000
  
  [dev.environment]
    NODE_ENV = "development"
    MONGODB_URI = "mongodb+srv://tonnyjosiah0:RoPir9xUMojez9xU@clustercrops.o4jur50.mongodb.net/"
    JWT_SECRET = "your-jwt-secret-key"  # Use a different one for development
    FRONTEND_URL = "http://localhost:5173"

# Handle both /api/* and /api/v1/* paths
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/auth/*"
  to = "/.netlify/functions/auth/:splat"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200