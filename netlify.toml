[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mongoose"]
  [functions.timeout]
    max = 10  # Maximum execution time in seconds

# Handle both /api/* and /api/v1/* paths
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/auth/*"
  to = "/.netlify/functions/auth/:splat"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables for local development
[dev]
  framework = "vite"
  publish = "dist"
  functions = "netlify/functions"